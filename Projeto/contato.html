<!DOCTYPE HTML>
<html lang="pt-br">

<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="format.css">
	<title>CFB Turismo</title>
</head>

<body>

	<header id="cabe">
		<img src="imagens/logo.svg">
		<div id="redes">
			<img src="imagens/fbicone.svg">
			<img src="imagens/twticone.svg">
		</div>
		<nav id="menu">
			<ul>
				<li><a href="index.html" target="_self">Home</a></li>
				<li><a href="destino.html" target="_self">Destinos</a></li>
				<li><a href="promocao.html" target="_self">Promoção</a></li>
				<li><a href="contato.html" target="_self">Contato</a></li>
		</nav>
	</header>

	<br class="fixFloat">

	<div id="content">

		<section id="contato">
			<form name="fContato" method="post" action="#">

				<label>Nome</label>
				<input type="text" maxlength="50" size="60" name="fNome" autofocus required>

				<label>Telefone</label>
				<input type="tel" maxlength="15" size="30" name="fFone" placeholder="(xx)xxxx-xxxx" required>

				<label>Email</label>
				<input type="email" maxlength="50" size="60" name="fEmail" required>

				<label>Destino</label>
				<input type="text" maxlength="50" size="60" name="fDestino" autofocus required>


				<label>Informe a data desejada</label>
				<input type="date" name="fNascimento" required>

				<br><br>
				<input type="submit" value="Enviar">
				<input type="reset" value="Limpar">

			</form>
		</section>

	</div>

	<br class="fixFloat">

	<footer>CFB Turismo, viaje bem viaje CFB Turismo.</footer>


</body>

</html>
